<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Nextgen Shield</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
  <div class="login-box">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Nextgen Shield">
    <h1>Nextgen Shield</h1>
    <p class="sub">Stationery Management System</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-gold btn-full">Sign in</button>
    </form>

    <p class="hint">Each person has their own login. Use from any device on the office network.</p>
  </div>
</body>
</html>
